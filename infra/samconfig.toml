# SAM deploy config. Secrets (DBPassword, JwtSecret, SeedAdminPassword) are NOT
# stored here — pass them with --parameter-overrides at deploy time, or use the
# first-run `sam deploy --guided`. See DEPLOY.md.
version = 0.1

[default.global.parameters]
stack_name = "tact-crm"

[default.build.parameters]
use_container = true          # build native deps (psycopg2, bcrypt) for Lambda Linux
cached = true

[default.deploy.parameters]
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true
confirm_changeset = true
disable_rollback = false

# Alembic config for TACT-CRM.
# Run from the database/ directory:
#   ..\backend\.venv\Scripts\python.exe -m alembic revision --autogenerate -m "msg"
#   ..\backend\.venv\Scripts\python.exe -m alembic upgrade head
# The DB URL is NOT set here — env.py pulls it from app config / DATABASE_URL,
# so dev (SQLite) and prod (Postgres) use the exact same migrations.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
